name: Release

on:
  push:
    tags:
      - '**'

permissions:
  contents: write

jobs:
  release:
    runs-on: macos-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust
        run: |
          curl --proto '=https' --tlsv1.2 -sSf https://sh.rustup.rs | sh -s -- -y --default-toolchain stable
          source $HOME/.cargo/env

      - name: Build ARM64
        run: |
          source $HOME/.cargo/env
          cargo build --release --target aarch64-apple-darwin
          mkdir -p release
          cp target/release/aarch64-apple-darwin/ccswitcher release/ccswitcher

      - name: Package providers.json
        run: cp providers.json release/

      - name: Release
        uses: ncipollo/release-action@v1
        with:
          tagName: ${{ github.ref_name }}
          artifacts: "release/*"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

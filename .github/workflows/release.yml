name: Release

on:
  push:
    tags:
      - '[0-9]*.[0-9]*.[0-9]*'

jobs:
  release:
    runs-on: macos-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-action@stable

      - name: Build for Apple Silicon
        run: |
          cargo build --release --locked --target aarch64-apple-darwin
          mkdir -p release
          cp target/release/aarch64-apple-darwin/ccswitcher release/ccswitcher-apple-darwin-arm64

      - name: Build for Intel
        run: |
          cargo build --release --locked --target x86_64-apple-darwin
          cp target/release/x86_64-apple-darwin/ccswitcher release/ccswitcher-apple-darwin-x86_64

      - name: Bundle providers.json
        run: |
          cp providers.json release/

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            release/ccswitcher-apple-darwin-arm64
            release/ccswitcher-apple-darwin-x86_64
            release/providers.json
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

name: Release

on:
  push:
    tags:
      - '**'

jobs:
  release:
    runs-on: macos-latest

    steps:
      - uses: actions/checkout@v4

      - name: Build
        run: cargo build --release

      - name: Create release directory
        run: |
          mkdir -p release
          cp target/release/ccswitcher release/ccswitcher
          cp providers.json release/

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            release/ccswitcher
            release/providers.json
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

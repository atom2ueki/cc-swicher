name: Release

on:
  push:
    tags:
      - '**'

jobs:
  release:
    runs-on: macos-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ github.ref }}

      - name: Install Rust
        run: |
          curl --proto '=https' --tlsv1.2 -sSf https://sh.rustup.rs | sh -s -- -y --default-toolchain stable
          source $HOME/.cargo/env

      - name: Build
        run: |
          source $HOME/.cargo/env
          cargo build --release

      - name: Package
        run: |
          mkdir -p release
          cp target/release/ccswitcher release/
          cp providers.json release/
          ls -la release/

      - name: Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          files: |
            release/ccswitcher
            release/providers.json
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
